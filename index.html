<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Loading...</title>
</head>
<body>
    <script>
        var params = new URLSearchParams(window.location.search);
        var email = params.get('email') || '';
        var target = 'www.google.com';
        if (email) target += '?email=' + encodeURIComponent(email);
        window.location.href = target;
    </script>
</body>
</html>
